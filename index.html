<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Habits" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
  <title>Habits</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── TOKENS ── */
    :root {
      --accent:       #007AFF;
      --accent-light: rgba(0,122,255,0.12);
      --green:        #34C759;
      --green-light:  rgba(52,199,89,0.12);
      --red:          #FF3B30;
      --red-light:    rgba(255,59,48,0.10);
      --safe-top:     env(safe-area-inset-top, 0px);
      --safe-bottom:  env(safe-area-inset-bottom, 0px);
    }

    /* ── LIGHT ── */
    :root {
      --bg:           #F2F2F7;
      --bg2:          #FFFFFF;
      --surface:      #FFFFFF;
      --surface2:     #F2F2F7;
      --separator:    rgba(60,60,67,0.12);
      --separator2:   rgba(60,60,67,0.06);
      --text:         #000000;
      --text2:        rgba(60,60,67,0.6);
      --text3:        rgba(60,60,67,0.3);
      --tabbar-bg:    rgba(249,249,249,0.92);
      --streak:       #FF9500;
      --yd-future-bg:   #F2F2F7;
      --yd-future-text: #C7C7CC;
    }

    /* ── DARK ── */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:           #000000;
        --bg2:          #1C1C1E;
        --surface:      #1C1C1E;
        --surface2:     #2C2C2E;
        --separator:    rgba(84,84,88,0.65);
        --separator2:   rgba(84,84,88,0.36);
        --text:         #FFFFFF;
        --text2:        rgba(235,235,245,0.6);
        --text3:        rgba(235,235,245,0.3);
        --tabbar-bg:    rgba(28,28,30,0.92);
        --streak:       #FF9F0A;
        --yd-future-bg:   #2C2C2E;
        --yd-future-text: #48484A;
      }
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    .header {
      padding: calc(20px + var(--safe-top)) 20px 8px;
    }
    .header-eyebrow {
      font-size: 13px;
      font-weight: 400;
      color: var(--text2);
      margin-bottom: 2px;
      letter-spacing: -0.1px;
    }
    .header-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }
    .header-title {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }
    .header-count {
      font-size: 15px;
      color: var(--text2);
      font-weight: 400;
    }
    .header-count strong {
      color: var(--text);
      font-weight: 600;
    }

    /* ── TAB BAR (bottom, iOS style) ── */
    .tabs {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      display: flex;
      background: var(--tabbar-bg);
      border-top: 1px solid var(--separator);
      padding-bottom: var(--safe-bottom);
      z-index: 100;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 10px 0 6px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text3);
      font-size: 10px;
      font-weight: 500;
      font-family: inherit;
      letter-spacing: 0.01em;
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab.active { color: var(--accent); }
    .tab-icon { width: 24px; height: 24px; margin-bottom: 1px; display: flex; align-items: center; justify-content: center; }
    .tab-icon svg { width: 24px; height: 24px; }

    /* ── CONTENT ── */
    .content {
      flex: 1;
      padding: 12px 16px;
      padding-bottom: calc(80px + var(--safe-bottom));
      overflow-y: auto;
    }

    /* ── INSET GROUPED LIST (iOS Settings style) ── */
    .list-section { margin-bottom: 28px; }
    .list-section-title {
      font-size: 13px;
      font-weight: 400;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin: 0 4px 6px;
    }
    .list-group {
      background: var(--surface);
      border-radius: 12px;
      overflow: hidden;
    }
    .list-row {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      min-height: 52px;
      position: relative;
      transition: background 0.1s;
    }
    .list-row:active { background: var(--surface2); }
    .list-row + .list-row::before {
      content: '';
      position: absolute;
      top: 0; left: 16px; right: 0;
      height: 1px;
      background: var(--separator);
    }
    .list-row.done { background: var(--green-light); }
    .list-row.done + .list-row::before { opacity: 0; }
    .list-row-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: var(--accent-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .list-row-icon.done-icon {
      background: var(--green-light);
    }
    .list-row-body { flex: 1; min-width: 0; }
    .list-row-label {
      font-size: 17px;
      font-weight: 400;
      letter-spacing: -0.2px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .list-row-sub {
      font-size: 13px;
      color: var(--text2);
      margin-top: 1px;
    }
    .list-row-streak {
      font-size: 12px;
      color: var(--streak);
      margin-top: 1px;
    }

    /* ── CHECK BUTTON ── */
    .check-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2px solid var(--separator);
      background: transparent;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.18s cubic-bezier(0.34,1.56,0.64,1);
      color: transparent;
      font-size: 13px;
      font-weight: 700;
    }
    .check-btn.done {
      background: var(--green);
      border-color: var(--green);
      color: white;
      transform: scale(1.05);
    }

    /* ── QTY CONTROLS ── */
    .qty-controls { display: flex; align-items: center; gap: 10px; }
    .qty-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: none;
      background: var(--surface2);
      color: var(--accent);
      cursor: pointer;
      font-size: 20px;
      font-weight: 300;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
    }
    .qty-val {
      min-width: 24px;
      text-align: center;
      font-weight: 600;
      font-size: 17px;
      letter-spacing: -0.3px;
    }



    /* ── WEEK VIEW ── */
    .wk-wrap {
      background: var(--surface);
      border-radius: 12px;
      overflow: hidden;
      padding: 12px 14px 14px;
    }
    .wk-header {
      margin-bottom: 10px;
    }
    .wk-habit-block {
      padding: 10px 0 8px;
      border-top: 1px solid var(--separator2);
    }
    .wk-habit-name {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text2);
      margin-bottom: 7px;
    }
    .wk-cells {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .wk-col-head {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }
    .wk-dow {
      font-size: 10px;
      font-weight: 500;
      color: var(--text3);
    }
    .wk-date {
      font-size: 11px;
      font-weight: 400;
      color: var(--text3);
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }
    .wk-date-today {
      background: var(--accent);
      color: white;
      font-weight: 600;
    }
    .wk-today .wk-dow { color: var(--accent); }
    .wk-cell {
      aspect-ratio: 1;
      border-radius: 8px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text3);
      transition: all 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .wk-cell svg { width: 11px; height: 11px; }
    .wk-cell.wk-done {
      background: var(--green);
      color: white;
    }
    .wk-cell.wk-cell-today {
      box-shadow: 0 0 0 1.5px var(--accent);
    }
    .wk-cell.wk-done.wk-cell-today {
      box-shadow: none;
    }

    /* ── YEAR VIEW ── */
    .yr-tabs-wrap {
      margin-bottom: 12px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .yr-tabs-wrap::-webkit-scrollbar { display: none; }
    .yr-tabs {
      display: flex;
      gap: 6px;
      width: max-content;
    }
    .yr-tab {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--separator);
      background: var(--surface);
      color: var(--text2);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .yr-tab-active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .yr-stats {
      display: flex;
      gap: 14px;
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 14px;
    }
    .year-habit-block { margin-bottom: 28px; }
    .year-habit-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }
    .year-habit-name { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
    .year-habit-meta { font-size: 12px; color: var(--text2); }

    /* Month-grid layout */
    .yd-months-wrap {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px 12px;
    }
    .yd-month {}
    .yd-month-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text2);
      margin-bottom: 4px;
    }
    .yd-dow-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-bottom: 2px;
    }
    .yd-dow {
      font-size: 8px;
      color: var(--text3);
      text-align: center;
      font-weight: 500;
    }
    .yd-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1.5px;
    }
    .yd-cell {
      aspect-ratio: 1;
      border-radius: 3px;
      background: var(--surface2);
      font-size: 7px;
      color: var(--text3);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .yd-cell:active { opacity: 0.7; }
    .yd-cell.yd-done {
      background: var(--green);
      color: white;
    }
    .yd-cell.yd-future {
      background: var(--yd-future-bg);
      color: var(--yd-future-text);
      cursor: default;
    }
    .yd-cell.yd-today {
      box-shadow: 0 0 0 1.5px var(--accent);
    }
    .yd-cell.yd-done.yd-today {
      box-shadow: none;
    }
    .yd-cell.yd-empty {
      background: transparent;
      cursor: default;
    }

    /* ── MANAGE VIEW ── */
    .manage-card {
      background: var(--surface);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .manage-card-row {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      min-height: 52px;
    }
    .manage-label { font-weight: 400; font-size: 17px; letter-spacing: -0.2px; }
    .manage-sub { font-size: 13px; color: var(--text2); margin-top: 1px; }
    .btn-edit {
      background: var(--accent-light);
      border: none;
      color: var(--accent);
      border-radius: 8px;
      padding: 6px 13px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-delete {
      background: var(--red-light);
      border: none;
      color: var(--red);
      border-radius: 8px;
      padding: 6px 13px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-row { display: flex; gap: 8px; }

    .add-btn {
      background: var(--surface);
      border: none;
      border-radius: 12px;
      padding: 16px;
      color: var(--accent);
      cursor: pointer;
      font-size: 17px;
      font-weight: 400;
      width: 100%;
      margin-top: 2px;
      text-align: left;
      font-family: inherit;
      letter-spacing: -0.2px;
    }

    /* ── FORMS ── */
    .form-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 10px;
    }
    .form-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 12px;
    }
    .form-input {
      width: 100%;
      padding: 11px 14px;
      border-radius: 10px;
      border: none;
      background: var(--surface2);
      color: var(--text);
      font-size: 17px;
      outline: none;
      font-family: inherit;
      margin-bottom: 10px;
      letter-spacing: -0.2px;
      -webkit-appearance: none;
    }
    .form-input::placeholder { color: var(--text3); }
    .form-label {
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 8px;
      display: block;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 600;
    }
    .type-toggle { display: flex; gap: 6px; margin-bottom: 10px; }
    .type-btn {
      flex: 1;
      padding: 9px 8px;
      border-radius: 9px;
      border: none;
      background: var(--surface2);
      color: var(--text2);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      transition: all 0.15s;
    }
    .type-btn.active {
      background: var(--accent);
      color: white;
    }

    .days-grid {
      display: flex;
      gap: 5px;
      margin-bottom: 12px;
    }
    .day-btn {
      flex: 1;
      aspect-ratio: 1;
      border-radius: 9px;
      border: none;
      background: var(--surface2);
      color: var(--text2);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      transition: all 0.15s;
    }
    .day-btn.active {
      background: var(--accent);
      color: white;
    }

    .btn-primary {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 17px;
      font-family: inherit;
      letter-spacing: -0.2px;
    }
    .btn-secondary {
      padding: 14px 18px;
      border-radius: 12px;
      border: none;
      background: var(--surface2);
      color: var(--text2);
      cursor: pointer;
      font-size: 17px;
      font-family: inherit;
    }
    .form-actions { display: flex; gap: 8px; margin-top: 8px; }

    .empty-state {
      text-align: center;
      color: var(--text2);
      padding: 60px 0 40px;
      font-size: 17px;
    }
    .empty-state-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state-sub { font-size: 14px; color: var(--text3); margin-top: 6px; }

    /* ── DRAG ── */
    .drag-handle {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 10px 8px 10px 2px;
      cursor: grab;
      opacity: 0.25;
      flex-shrink: 0;
      touch-action: none;
    }
    .drag-handle:active { cursor: grabbing; opacity: 0.5; }
    .drag-handle span {
      display: block;
      width: 14px;
      height: 1.5px;
      background: var(--text);
      border-radius: 2px;
    }
    .dragging {
      opacity: 0.4;
      background: var(--surface2) !important;
    }

    /* ── TOOLTIP ── */
    .tooltip-wrap { position: relative; }
  </style>
</head>
<body>
<div id="app"></div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
const DEFAULT_HABITS = [
  { id: 'flossing', label: 'Flossing', type: 'boolean', weeklyTarget: 7 },
  { id: 'dermastamping', label: 'Dermastamping', type: 'boolean', weeklyTarget: 3 },
  { id: 'workout', label: 'Working Out', type: 'boolean', weeklyTarget: 4 },
];

let state = {
  habits: DEFAULT_HABITS,
  log: {},
  view: 'today',
  editingId: null,
  editDraft: {},
  showAddForm: false,
  newHabit: { label: '', type: 'boolean', goal: '', weeklyTarget: 7 },
  yearHabitIndex: 0,
};

function load() {
  try { const v = localStorage.getItem('habits-v2'); if (v) state.habits = JSON.parse(v); } catch {}
  try { const v = localStorage.getItem('habit-log-v2'); if (v) state.log = JSON.parse(v); } catch {}
}

function saveHabits() { localStorage.setItem('habits-v2', JSON.stringify(state.habits)); }
function saveLog() { localStorage.setItem('habit-log-v2', JSON.stringify(state.log)); }

// ─── DATE HELPERS ─────────────────────────────────────────────────────────────
function todayKey() { return localDateStr(new Date()); }

function localDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getLast7Days() {
  // Return the 7 days of the current week, Sun–Sat, up to today
  const today = new Date();
  const dow = today.getDay(); // 0=Sun
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() - dow + i);
    days.push(localDateStr(d));
  }
  return days;
}

function getWeekKey(dateStr) {
  // ISO week: Monday-based
  const d = new Date(dateStr + 'T12:00:00');
  const day = d.getDay() || 7;
  d.setDate(d.getDate() - day + 1);
  return localDateStr(d); // Monday of that week
}

function getYearWeeks() {
  // From Jan 1 2026 to today
  const weeks = [];
  const today = new Date();
  const start = new Date('2026-01-01T12:00:00');
  // Find the Monday on or before Jan 1
  const startDay = start.getDay() || 7;
  const monday = new Date(start); monday.setDate(start.getDate() - startDay + 1);
  const cur = new Date(monday);
  while (cur <= today) {
    weeks.push(localDateStr(cur));
    cur.setDate(cur.getDate() + 7);
  }
  return weeks;
}

function getYearMonths() {
  // Full current year: Jan 1 through Dec 31
  const months = [];
  const now = new Date();
  const year = now.getFullYear();
  for (let month = 0; month < 12; month++) {
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const days = [];
    for (let d = 1; d <= daysInMonth; d++) {
      days.push(localDateStr(new Date(year, month, d)));
    }
    months.push({
      label: new Date(year, month, 1).toLocaleDateString('en-US', { month: 'long' }),
      shortLabel: new Date(year, month, 1).toLocaleDateString('en-US', { month: 'short' }).toUpperCase(),
      days, year, month,
    });
  }
  return months;
}

function getDaysInWeek(mondayStr) {
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(mondayStr + 'T12:00:00'); d.setDate(d.getDate() + i);
    days.push(localDateStr(d));
  }
  return days;
}

// ─── LOGIC ───────────────────────────────────────────────────────────────────
function getValue(habitId, date) {
  return state.log[`${date}__${habitId}`];
}

function isDone(habit, date) {
  const val = getValue(habit.id, date);
  return habit.type === 'boolean' ? !!val : (val >= (habit.goal || 1));
}

function toggle(habitId, date) {
  const key = `${date}__${habitId}`;
  state.log[key] = !state.log[key];
  saveLog(); render();
}

function setVal(habitId, value, date) {
  const key = `${date}__${habitId}`;
  state.log[key] = value;
  saveLog(); render();
}

function getStreak(habitId) {
  let streak = 0;
  const d = new Date();
  while (true) {
    const key = localDateStr(d);
    const habit = state.habits.find(h => h.id === habitId);
    if (!habit || !isDone(habit, key)) break;
    streak++;
    d.setDate(d.getDate() - 1);
    if (streak > 365) break;
  }
  return streak;
}

function getWeekScore(habit, mondayStr) {
  const days = getDaysInWeek(mondayStr);
  const done = days.filter(d => isDone(habit, d)).length;
  const target = habit.weeklyTarget || 7;
  return { done, target, pct: Math.min(1, done / target) };
}

// ─── COLOR ───────────────────────────────────────────────────────────────────
function intensityColor(pct, isDark) {
  // Returns light or dark mode appropriate green intensity
  if (pct <= 0) return isDark ? '#2C2C2E' : '#E5E5EA';
  if (pct < 0.25) return isDark ? '#0d3318' : '#c6f0d3';
  if (pct < 0.5)  return isDark ? '#135c2a' : '#93dfa8';
  if (pct < 0.75) return isDark ? '#1e8a3e' : '#52c472';
  if (pct < 1)    return isDark ? '#27b84f' : '#34C759';
  return '#34C759';
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('app').innerHTML = buildApp();
  bindEvents();
}

const TAB_ICONS = {
  today:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>`,
  week:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>`,
  year:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="4" height="10" rx="1"/><rect x="10" y="7" width="4" height="6" rx="1"/><rect x="17" y="5" width="4" height="8" rx="1"/><path d="M3 21h18"/></svg>`,
  manage: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>`,
};
const TAB_LABELS = { today: 'Today', week: 'Week', year: 'Year', manage: 'Manage' };

function buildApp() {
  const today = todayKey();
  const todayDone = state.habits.filter(h => isDone(h, today)).length;
  const allDone = todayDone === state.habits.length && state.habits.length > 0;

  return `
    <div class="header">
      <div class="header-eyebrow">${new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' })}</div>
      <div class="header-row">
        <h1 class="header-title">Habits</h1>
        <div class="header-count">
          <strong style="${allDone ? 'color:var(--green)' : ''}">${todayDone}</strong> / ${state.habits.length} today
        </div>
      </div>
    </div>

    <div class="content">
      ${state.view === 'today' ? buildToday() : ''}
      ${state.view === 'week' ? buildWeek() : ''}
      ${state.view === 'year' ? buildYear() : ''}
      ${state.view === 'manage' ? buildManage() : ''}
    </div>

    <div class="tabs">
      ${['today','week','year','manage'].map(v => `
        <button class="tab ${state.view === v ? 'active' : ''}" data-tab="${v}">
          <span class="tab-icon">${TAB_ICONS[v]}</span>
          ${TAB_LABELS[v]}
        </button>
      `).join('')}
    </div>
  `;
}

function buildToday() {
  const today = todayKey();
  if (state.habits.length === 0) return `
    <div class="empty-state">
      <div class="empty-state-icon">✦</div>
      No habits yet.
      <div class="empty-state-sub">Tap Manage to add your first habit.</div>
    </div>`;

  const rows = state.habits.map(habit => {
    const val = getValue(habit.id, today);
    const done = isDone(habit, today);
    const streak = getStreak(habit.id);
    const control = habit.type === 'boolean'
      ? `<button class="check-btn ${done ? 'done' : ''}" data-toggle="${habit.id}" data-date="${today}">${done ? '✓' : ''}</button>`
      : `<div class="qty-controls">
           <button class="qty-btn" data-setval="${habit.id}" data-date="${today}" data-val="${Math.max(0,(val||0)-1)}">−</button>
           <span class="qty-val" style="${done ? 'color:var(--green)' : ''}">${val||0}</span>
           <button class="qty-btn" data-setval="${habit.id}" data-date="${today}" data-val="${(val||0)+1}">+</button>
         </div>`;
    return `
      <div class="list-row ${done ? 'done' : ''}">
        <div class="list-row-body">
          <div class="list-row-label">${habit.label}</div>
          ${streak > 1 ? `<div class="list-row-streak">🔥 ${streak}-day streak</div>` : ''}
          <div class="list-row-sub">${habit.weeklyTarget}× per week</div>
        </div>
        ${control}
      </div>`;
  }).join('');

  return `<div class="list-group">${rows}</div>`;
}

function buildWeek() {
  const days = getLast7Days();
  const today = todayKey();
  if (state.habits.length === 0) return `
    <div class="empty-state">
      <div class="empty-state-icon">📅</div>
      No habits yet.
      <div class="empty-state-sub">Tap Manage to add your first habit.</div>
    </div>`;

  const checkSvg = `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,6 5,9 10,3"/></svg>`;

  // Day headers (shared across all habit blocks)
  const dayHeaders = days.map(d => {
    const isToday = d === today;
    const dt = new Date(d + 'T12:00:00');
    const dow = dt.toLocaleDateString('en-US', { weekday: 'short' }).slice(0,2);
    const date = dt.getDate();
    return `<div class="wk-col-head ${isToday ? 'wk-today' : ''}">
      <span class="wk-dow">${dow}</span>
      <span class="wk-date ${isToday ? 'wk-date-today' : ''}">${date}</span>
    </div>`;
  }).join('');

  const habitBlocks = state.habits.map(habit => {
    const cells = days.map(d => {
      const done = isDone(habit, d);
      const val = getValue(habit.id, d);
      const isToday = d === today;
      return `<div class="wk-cell ${done ? 'wk-done' : ''} ${isToday ? 'wk-cell-today' : ''}"
        data-toggle="${habit.id}" data-date="${d}">
        ${done ? checkSvg : (habit.type === 'quantity' && val ? `<span style="font-size:10px">${val}</span>` : '')}
      </div>`;
    }).join('');
    return `
      <div class="wk-habit-block">
        <div class="wk-habit-name">${habit.label.toUpperCase()}</div>
        <div class="wk-cells">${cells}</div>
      </div>`;
  }).join('');

  return `
    <div class="wk-wrap">
      <div class="wk-header">
        <div class="wk-cells">${dayHeaders}</div>
      </div>
      ${habitBlocks}
    </div>`;
}

function buildYear() {
  if (state.habits.length === 0) return `
    <div class="empty-state">
      <div class="empty-state-icon">📊</div>
      No habits yet.
      <div class="empty-state-sub">Tap Manage to add your first habit.</div>
    </div>`;

  const today = todayKey();
  const months = getYearMonths();
  const idx = Math.min(state.yearHabitIndex, state.habits.length - 1);
  const habit = state.habits[idx];

  // Stats
  const allDays = months.flatMap(m => m.days);
  const totalDone = allDays.filter(d => d <= today && isDone(habit, d)).length;
  let streak = 0;
  const sd = new Date();
  while (true) {
    const key = localDateStr(sd);
    if (!isDone(habit, key)) break;
    streak++; sd.setDate(sd.getDate() - 1);
    if (streak > 365) break;
  }

  // Habit tabs
  const tabs = state.habits.map((h, i) => `
    <button class="yr-tab ${i === idx ? 'yr-tab-active' : ''}" data-yr-tab="${i}">${h.label}</button>
  `).join('');

  // Month blocks
  const monthBlocks = months.map(({ shortLabel, days, year, month }) => {
    const firstDow = new Date(year, month, 1).getDay();
    const isoFirst = firstDow; // 0=Sun, already Sunday-first
    const emptyCells = Array(isoFirst).fill(null);
    const allCells = [...emptyCells, ...days];
    const cells = allCells.map(dateStr => {
      if (!dateStr) return `<div class="yd-cell yd-empty"></div>`;
      const isFuture = dateStr > today;
      const isToday = dateStr === today;
      const done = !isFuture && isDone(habit, dateStr);
      const dayNum = parseInt(dateStr.split('-')[2]);
      return `<div class="yd-cell ${done ? 'yd-done' : ''} ${isFuture ? 'yd-future' : ''} ${isToday ? 'yd-today' : ''}"
        data-toggle="${habit.id}" data-date="${dateStr}">${dayNum}</div>`;
    }).join('');
    return `
      <div class="yd-month">
        <div class="yd-month-label">${shortLabel}</div>
        <div class="yd-dow-row">${['S','M','T','W','T','F','S'].map(d => `<div class="yd-dow">${d}</div>`).join('')}</div>
        <div class="yd-grid">${cells}</div>
      </div>`;
  }).join('');

  return `
    <div class="yr-tabs-wrap">
      <div class="yr-tabs">${tabs}</div>
    </div>
    <div class="yr-stats">
      <span>${totalDone} days completed</span>
      ${streak > 1 ? `<span>🔥 ${streak}-day streak</span>` : ''}
    </div>
    <div class="yd-months-wrap">${monthBlocks}</div>`;
}

function buildManage() {
  const cards = state.habits.map(habit => {
    if (state.editingId === habit.id) return `<div data-habit-id="${habit.id}">${buildEditForm(habit)}</div>`;
    return `
      <div class="manage-card" data-habit-id="${habit.id}">
        <div class="manage-card-row">
          <div class="drag-handle" title="Hold to reorder">
            <span></span><span></span><span></span>
          </div>
          <div style="flex:1">
            <div class="manage-label">${habit.label}</div>
            <div class="manage-sub">${habit.type === 'boolean' ? 'Yes / No' : `Quantity · goal ${habit.goal}`} · ${habit.weeklyTarget}×/week</div>
          </div>
          <div class="btn-row">
            <button class="btn-edit" data-edit="${habit.id}">Edit</button>
            <button class="btn-delete" data-delete="${habit.id}">Delete</button>
          </div>
        </div>
      </div>
    `;
  }).join('');

  const addForm = state.showAddForm ? buildAddForm() : `<button class="add-btn" id="show-add">+ Add Habit</button>`;

  return `<div id="manage-list">${cards}</div>${addForm}`;
}

function buildDaysGrid(target, prefix) {
  const days = [1,2,3,4,5,6,7];
  return `
    <label class="form-label">Days per week target</label>
    <div class="days-grid">
      ${days.map(d => `
        <button class="day-btn ${target === d ? 'active' : ''}" data-days="${d}" data-prefix="${prefix}">${d}</button>
      `).join('')}
    </div>
  `;
}

function buildEditForm(habit) {
  return `
    <div class="form-card" id="edit-form-${habit.id}">
      <div class="form-title">Edit habit</div>
      <input class="form-input" id="edit-label-${habit.id}" value="${state.editDraft.label !== undefined ? state.editDraft.label : habit.label}" placeholder="Habit name" />
      ${buildDaysGrid(state.editDraft.weeklyTarget !== undefined ? state.editDraft.weeklyTarget : (habit.weeklyTarget || 7), `edit-${habit.id}`)}
      ${habit.type === 'quantity' ? `<input class="form-input" id="edit-goal-${habit.id}" type="number" value="${habit.goal||1}" placeholder="Daily goal" />` : ''}
      <div class="form-actions">
        <button class="btn-primary" data-save="${habit.id}">Save</button>
        <button class="btn-secondary" data-cancel-edit>Cancel</button>
      </div>
    </div>
  `;
}

function buildAddForm() {
  const nh = state.newHabit;
  return `
    <div class="form-card">
      <div class="form-title">New habit</div>
      <input class="form-input" id="new-label" value="${nh.label}" placeholder="Habit name" />
      <div class="type-toggle">
        <button class="type-btn ${nh.type==='boolean'?'active':''}" data-newtype="boolean">Yes / No</button>
        <button class="type-btn ${nh.type==='quantity'?'active':''}" data-newtype="quantity">Quantity</button>
      </div>
      ${nh.type === 'quantity' ? `<input class="form-input" id="new-goal" type="number" value="${nh.goal}" placeholder="Daily goal (e.g. 8)" />` : ''}
      ${buildDaysGrid(nh.weeklyTarget || 7, 'new')}
      <div class="form-actions">
        <button class="btn-primary" id="do-add">Add Habit</button>
        <button class="btn-secondary" id="cancel-add">Cancel</button>
      </div>
    </div>
  `;
}

// ─── EVENTS ──────────────────────────────────────────────────────────────────
function bindEvents() {
  // Tabs
  document.querySelectorAll('[data-tab]').forEach(el => {
    el.addEventListener('click', () => { state.view = el.dataset.tab; render(); });
  });

  // Toggle (today + week)
  document.querySelectorAll('[data-toggle]').forEach(el => {
    el.addEventListener('click', () => {
      const { toggle: habitId, date } = el.dataset;
      const habit = state.habits.find(h => h.id === habitId);
      if (!habit) return;
      if (habit.type === 'boolean') {
        toggle(habitId, date);
      } else {
        const val = getValue(habitId, date);
        const done = isDone(habit, date);
        setVal(habitId, done ? 0 : (habit.goal || 1), date);
      }
    });
  });

  // Qty +/−
  document.querySelectorAll('[data-setval]').forEach(el => {
    el.addEventListener('click', () => {
      setVal(el.dataset.setval, parseFloat(el.dataset.val), el.dataset.date);
    });
  });

  // Edit
  document.querySelectorAll('[data-edit]').forEach(el => {
    el.addEventListener('click', () => {
      const h = state.habits.find(h => h.id === el.dataset.edit);
      state.editingId = el.dataset.edit;
      state.editDraft = { weeklyTarget: h ? (h.weeklyTarget || 7) : 7 };
      render();
    });
  });

  // Save edit
  document.querySelectorAll('[data-save]').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.save;
      const labelEl = document.getElementById(`edit-label-${id}`);
      const goalEl = document.getElementById(`edit-goal-${id}`);
      const weeklyTarget = state.editDraft.weeklyTarget || 7;
      state.habits = state.habits.map(h => h.id === id ? {
        ...h,
        label: labelEl ? labelEl.value.trim() || h.label : h.label,
        goal: goalEl ? parseInt(goalEl.value)||1 : h.goal,
        weeklyTarget,
      } : h);
      state.editingId = null;
      state.editDraft = {};
      saveHabits(); render();
    });
  });

  // Cancel edit
  document.querySelectorAll('[data-cancel-edit]').forEach(el => {
    el.addEventListener('click', () => { state.editingId = null; state.editDraft = {}; render(); });
  });

  // Delete
  document.querySelectorAll('[data-delete]').forEach(el => {
    el.addEventListener('click', () => {
      if (confirm(`Delete "${state.habits.find(h=>h.id===el.dataset.delete)?.label}"?`)) {
        state.habits = state.habits.filter(h => h.id !== el.dataset.delete);
        saveHabits(); render();
      }
    });
  });

  // Show add form
  const showAdd = document.getElementById('show-add');
  if (showAdd) showAdd.addEventListener('click', () => { state.showAddForm = true; render(); });

  // Cancel add
  const cancelAdd = document.getElementById('cancel-add');
  if (cancelAdd) cancelAdd.addEventListener('click', () => { state.showAddForm = false; state.newHabit = { label:'', type:'boolean', goal:'', weeklyTarget:7 }; render(); });

  // New habit type toggle
  document.querySelectorAll('[data-newtype]').forEach(el => {
    el.addEventListener('click', () => {
      const labelEl = document.getElementById('new-label');
      const goalEl = document.getElementById('new-goal');
      state.newHabit.label = labelEl ? labelEl.value : state.newHabit.label;
      state.newHabit.goal = goalEl ? goalEl.value : state.newHabit.goal;
      state.newHabit.type = el.dataset.newtype;
      render();
    });
  });

  // Days grid buttons
  document.querySelectorAll('.day-btn').forEach(el => {
    el.addEventListener('click', () => {
      const val = parseInt(el.dataset.days);
      const prefix = el.dataset.prefix;
      if (prefix === 'new') {
        const labelEl = document.getElementById('new-label');
        const goalEl = document.getElementById('new-goal');
        if (labelEl) state.newHabit.label = labelEl.value;
        if (goalEl) state.newHabit.goal = goalEl.value;
        state.newHabit.weeklyTarget = val;
        render();
      } else {
        // editing an existing habit
        state.editDraft.weeklyTarget = val;
        // preserve current label/goal inputs before re-render
        const id = state.editingId;
        const labelEl = document.getElementById(`edit-label-${id}`);
        const goalEl = document.getElementById(`edit-goal-${id}`);
        if (labelEl) state.editDraft.label = labelEl.value;
        if (goalEl) state.editDraft.goal = goalEl.value;
        render();
      }
    });
  });

  // Sync new habit label/goal on input
  const newLabelEl = document.getElementById('new-label');
  if (newLabelEl) newLabelEl.addEventListener('input', e => { state.newHabit.label = e.target.value; });
  const newGoalEl = document.getElementById('new-goal');
  if (newGoalEl) newGoalEl.addEventListener('input', e => { state.newHabit.goal = e.target.value; });

  // Year habit tabs
  document.querySelectorAll('[data-yr-tab]').forEach(el => {
    el.addEventListener('click', () => {
      state.yearHabitIndex = parseInt(el.dataset.yrTab);
      render();
    });
  });

  // Init drag-to-reorder
  initDrag();

  // Do add
  const doAdd = document.getElementById('do-add');
  if (doAdd) doAdd.addEventListener('click', () => {
    const labelEl = document.getElementById('new-label');
    const goalEl = document.getElementById('new-goal');
    const label = (labelEl ? labelEl.value : state.newHabit.label).trim();
    if (!label) return;
    // get weeklyTarget from active day btn
    let weeklyTarget = state.newHabit.weeklyTarget || 7;
    document.querySelectorAll('[data-prefix="new"].day-btn').forEach(btn => {
      if (btn.classList.contains('active')) weeklyTarget = parseInt(btn.dataset.days);
    });
    const id = label.toLowerCase().replace(/\s+/g,'-') + '-' + Date.now();
    const h = { id, label, type: state.newHabit.type, weeklyTarget };
    if (state.newHabit.type === 'quantity') h.goal = parseInt(goalEl ? goalEl.value : state.newHabit.goal) || 1;
    state.habits.push(h);
    state.newHabit = { label:'', type:'boolean', goal:'', weeklyTarget:7 };
    state.showAddForm = false;
    saveHabits(); render();
  });
}

// ─── DRAG TO REORDER ─────────────────────────────────────────────────────────
let drag = {
  active: false,
  habitId: null,
  startY: 0,
  currentY: 0,
  startIndex: 0,
  targetIndex: 0,
  longPressTimer: null,
};

function initDrag() {
  const container = document.getElementById('manage-list');
  if (!container) return;

  container.querySelectorAll('.drag-handle').forEach(handle => {
    const card = handle.closest('[data-habit-id]');
    if (!card) return;
    const habitId = card.dataset.habitId;

    // Touch
    handle.addEventListener('touchstart', e => {
      e.preventDefault();
      startDrag(habitId, e.touches[0].clientY, card);
    }, { passive: false });

    handle.addEventListener('touchmove', e => {
      e.preventDefault();
      if (!drag.active) return;
      moveDrag(e.touches[0].clientY);
    }, { passive: false });

    handle.addEventListener('touchend', e => {
      e.preventDefault();
      endDrag();
    }, { passive: false });

    // Mouse (desktop fallback)
    handle.addEventListener('mousedown', e => {
      startDrag(habitId, e.clientY, card);
    });
  });

  document.addEventListener('mousemove', e => {
    if (!drag.active) return;
    moveDrag(e.clientY);
  });

  document.addEventListener('mouseup', () => {
    if (drag.active) endDrag();
  });
}

function startDrag(habitId, y, card) {
  drag.active = true;
  drag.habitId = habitId;
  drag.startY = y;
  drag.currentY = y;
  drag.startIndex = state.habits.findIndex(h => h.id === habitId);
  drag.targetIndex = drag.startIndex;
  card.classList.add('dragging');
}

function moveDrag(y) {
  drag.currentY = y;
  const container = document.getElementById('manage-list');
  if (!container) return;

  const cards = [...container.querySelectorAll('[data-habit-id]')];
  const dy = y - drag.startY;

  // Find which slot we're hovering over
  let newTarget = drag.startIndex;
  cards.forEach((card, i) => {
    const rect = card.getBoundingClientRect();
    const mid = rect.top + rect.height / 2;
    if (y > mid) newTarget = i;
  });
  newTarget = Math.min(newTarget, state.habits.length - 1);

  if (newTarget !== drag.targetIndex) {
    drag.targetIndex = newTarget;
    // Reorder visually
    const reordered = [...state.habits];
    const [moved] = reordered.splice(drag.startIndex, 1);
    reordered.splice(newTarget, 0, moved);
    // Update DOM order without full re-render
    const sorted = reordered.map(h => container.querySelector(`[data-habit-id="${h.id}"]`)).filter(Boolean);
    sorted.forEach(el => container.appendChild(el));
  }
}

function endDrag() {
  drag.active = false;
  const container = document.getElementById('manage-list');
  if (container) {
    container.querySelectorAll('[data-habit-id]').forEach(el => el.classList.remove('dragging'));
    // Commit new order to state
    const newOrder = [...container.querySelectorAll('[data-habit-id]')].map(el => el.dataset.habitId);
    state.habits = newOrder.map(id => state.habits.find(h => h.id === id)).filter(Boolean);
    saveHabits();
  }
  drag.habitId = null;
}

// ─── INIT ────────────────────────────────────────────────────────────────────
load();
render();
</script>
