<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Habits" />
  <meta name="theme-color" content="#0f0f0f" />
  <title>Habits</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #161616;
      --surface2: #1e1e1e;
      --border: #222;
      --border2: #2a2a2a;
      --text: #f0f0f0;
      --text2: #aaa;
      --text3: #555;
      --green: #4ade80;
      --green-dim: #a8e6a3;
      --green-bg: #1a2e1a;
      --green-border: #2d4d2d;
      --red: #e88;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    #app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    .header {
      padding: calc(16px + var(--safe-top)) 24px 16px;
    }
    .header-eyebrow {
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--text3);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .header-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }
    .header-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .header-count { font-size: 13px; color: var(--text2); }
    .header-count span { font-weight: 600; }

    /* TABS */
    .tabs {
      display: flex;
      border-bottom: 1px solid #1e1e1e;
      padding: 0 24px;
      gap: 24px;
      flex-shrink: 0;
    }
    .tab {
      background: none;
      border: none;
      cursor: pointer;
      padding: 10px 0;
      font-size: 13px;
      font-weight: 500;
      color: var(--text3);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      text-transform: capitalize;
      letter-spacing: 0.02em;
      transition: color 0.15s;
    }
    .tab.active {
      color: var(--text);
      border-bottom-color: var(--text);
    }

    /* CONTENT */
    .content {
      flex: 1;
      padding: 20px 24px;
      padding-bottom: calc(32px + var(--safe-bottom));
      overflow-y: auto;
    }

    /* HABIT CARDS */
    .habit-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      transition: background 0.15s, border-color 0.15s;
    }
    .habit-card.done {
      background: var(--green-bg);
      border-color: var(--green-border);
    }
    .habit-label { font-weight: 500; font-size: 15px; }
    .habit-streak { font-size: 11px; color: var(--green-dim); margin-top: 2px; }
    .habit-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

    .check-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 2px solid var(--border2);
      background: transparent;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      transition: all 0.15s;
      flex-shrink: 0;
      color: var(--bg);
    }
    .check-btn.done {
      background: var(--green);
      border-color: var(--green);
    }

    .qty-controls { display: flex; align-items: center; gap: 8px; }
    .qty-btn {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .qty-val {
      min-width: 28px;
      text-align: center;
      font-weight: 600;
      font-size: 16px;
    }

    /* WEEK VIEW */
    .week-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .week-table th {
      padding: 8px 4px;
      font-weight: 500;
      font-size: 11px;
      color: var(--text3);
      text-align: center;
    }
    .week-table th.today-col { color: var(--text); font-weight: 600; }
    .week-table th.habit-col { text-align: left; padding-left: 0; }
    .week-table td { padding: 10px 4px; border-top: 1px solid #1a1a1a; }
    .week-table td.habit-name { color: var(--text2); font-size: 13px; padding-left: 0; }

    .week-cell {
      width: 28px; height: 28px;
      border-radius: 7px;
      margin: 0 auto;
      background: var(--surface2);
      border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      color: var(--text3);
      cursor: pointer;
      transition: all 0.12s;
      user-select: none;
    }
    .week-cell.done {
      background: var(--green);
      border-color: var(--green);
      color: var(--bg);
    }

    /* YEAR VIEW */
    .year-habit-block { margin-bottom: 28px; }
    .year-habit-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }
    .year-habit-name { font-size: 14px; font-weight: 600; }
    .year-habit-meta { font-size: 11px; color: var(--text3); }

    .year-grid {
      display: flex;
      gap: 3px;
      flex-wrap: nowrap;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .year-col { display: flex; flex-direction: column; gap: 3px; }
    .year-cell {
      width: 10px; height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
      cursor: default;
    }

    .month-labels {
      display: flex;
      gap: 3px;
      margin-bottom: 4px;
      overflow-x: hidden;
    }
    .month-label {
      font-size: 9px;
      color: var(--text3);
      white-space: nowrap;
    }

    /* MANAGE VIEW */
    .manage-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .manage-card-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .manage-label { font-weight: 500; font-size: 15px; }
    .manage-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }
    .btn-edit {
      background: var(--surface2);
      border: none;
      color: var(--text2);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
    }
    .btn-delete {
      background: #2a1a1a;
      border: none;
      color: var(--red);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
    }
    .btn-row { display: flex; gap: 8px; }

    .add-btn {
      background: transparent;
      border: 2px dashed var(--border2);
      border-radius: 14px;
      padding: 16px;
      color: var(--text3);
      cursor: pointer;
      font-size: 14px;
      width: 100%;
      margin-top: 2px;
    }

    /* FORMS */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 10px;
    }
    .form-title { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 12px; }
    .form-input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--text);
      font-size: 14px;
      outline: none;
      font-family: inherit;
      margin-bottom: 10px;
    }
    .form-input:focus { border-color: #444; }
    .form-label { font-size: 12px; color: var(--text3); margin-bottom: 6px; display: block; }
    .type-toggle { display: flex; gap: 8px; margin-bottom: 10px; }
    .type-btn {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--text2);
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      transition: all 0.12s;
    }
    .type-btn.active {
      border-color: var(--green);
      background: var(--green-bg);
      color: var(--green);
    }

    .days-grid {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .day-btn {
      flex: 1;
      aspect-ratio: 1;
      border-radius: 8px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--text3);
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      font-family: inherit;
      transition: all 0.12s;
    }
    .day-btn.active {
      border-color: var(--green);
      background: var(--green-bg);
      color: var(--green);
    }

    .btn-primary {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: var(--green);
      color: var(--bg);
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
    }
    .btn-secondary {
      padding: 10px 16px;
      border-radius: 10px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
    }
    .form-actions { display: flex; gap: 8px; margin-top: 4px; }

    .empty-state {
      text-align: center;
      color: var(--text3);
      padding: 40px 0;
      font-size: 14px;
    }

    /* TOOLTIP */
    .tooltip-wrap { position: relative; }
    .tooltip {
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: var(--text);
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      z-index: 10;
    }
    .tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 4px solid transparent;
      border-top-color: #333;
    }
  </style>
</head>
<body>
<div id="app"></div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
const DEFAULT_HABITS = [
  { id: 'flossing', label: 'Flossing', type: 'boolean', weeklyTarget: 7 },
  { id: 'dermastamping', label: 'Dermastamping', type: 'boolean', weeklyTarget: 3 },
  { id: 'workout', label: 'Working Out', type: 'boolean', weeklyTarget: 4 },
];

let state = {
  habits: DEFAULT_HABITS,
  log: {},
  view: 'today',
  editingId: null,
  showAddForm: false,
  tooltip: null, // { habitId, weekKey }
  newHabit: { label: '', type: 'boolean', goal: '', weeklyTarget: 7 },
};

function load() {
  try { const v = localStorage.getItem('habits-v2'); if (v) state.habits = JSON.parse(v); } catch {}
  try { const v = localStorage.getItem('habit-log-v2'); if (v) state.log = JSON.parse(v); } catch {}
}

function saveHabits() { localStorage.setItem('habits-v2', JSON.stringify(state.habits)); }
function saveLog() { localStorage.setItem('habit-log-v2', JSON.stringify(state.log)); }

// ─── DATE HELPERS ─────────────────────────────────────────────────────────────
function todayKey() { return localDateStr(new Date()); }

function localDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getLast7Days() {
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    days.push(localDateStr(d));
  }
  return days;
}

function getWeekKey(dateStr) {
  // ISO week: Monday-based
  const d = new Date(dateStr + 'T12:00:00');
  const day = d.getDay() || 7;
  d.setDate(d.getDate() - day + 1);
  return localDateStr(d); // Monday of that week
}

function getYearWeeks() {
  // 52 weeks ending today
  const weeks = [];
  const today = new Date();
  const day = today.getDay() || 7;
  const monday = new Date(today); monday.setDate(today.getDate() - day + 1);
  for (let i = 51; i >= 0; i--) {
    const w = new Date(monday); w.setDate(monday.getDate() - i * 7);
    weeks.push(localDateStr(w));
  }
  return weeks;
}

function getDaysInWeek(mondayStr) {
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(mondayStr + 'T12:00:00'); d.setDate(d.getDate() + i);
    days.push(localDateStr(d));
  }
  return days;
}

// ─── LOGIC ───────────────────────────────────────────────────────────────────
function getValue(habitId, date) {
  return state.log[`${date}__${habitId}`];
}

function isDone(habit, date) {
  const val = getValue(habit.id, date);
  return habit.type === 'boolean' ? !!val : (val >= (habit.goal || 1));
}

function toggle(habitId, date) {
  const key = `${date}__${habitId}`;
  state.log[key] = !state.log[key];
  saveLog(); render();
}

function setVal(habitId, value, date) {
  const key = `${date}__${habitId}`;
  state.log[key] = value;
  saveLog(); render();
}

function getStreak(habitId) {
  let streak = 0;
  const d = new Date();
  while (true) {
    const key = localDateStr(d);
    const habit = state.habits.find(h => h.id === habitId);
    if (!habit || !isDone(habit, key)) break;
    streak++;
    d.setDate(d.getDate() - 1);
    if (streak > 365) break;
  }
  return streak;
}

function getWeekScore(habit, mondayStr) {
  const days = getDaysInWeek(mondayStr);
  const done = days.filter(d => isDone(habit, d)).length;
  const target = habit.weeklyTarget || 7;
  return { done, target, pct: Math.min(1, done / target) };
}

// ─── COLOR ───────────────────────────────────────────────────────────────────
function intensityColor(pct) {
  if (pct <= 0) return '#1e1e1e';
  if (pct < 0.25) return '#0d2b0d';
  if (pct < 0.5) return '#1a4a1a';
  if (pct < 0.75) return '#2a6e2a';
  if (pct < 1) return '#3aaa3a';
  return '#4ade80';
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('app').innerHTML = buildApp();
  bindEvents();
}

function buildApp() {
  const today = todayKey();
  const todayDone = state.habits.filter(h => isDone(h, today)).length;
  const allDone = todayDone === state.habits.length && state.habits.length > 0;

  return `
    <div class="header">
      <div class="header-eyebrow">${new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' })}</div>
      <div class="header-row">
        <h1 class="header-title">Habits</h1>
        <div class="header-count">
          <span style="color:${allDone ? '#a8e6a3' : '#f0f0f0'}">${todayDone}</span>
          <span style="color:#555"> / ${state.habits.length} today</span>
        </div>
      </div>
    </div>

    <div class="tabs">
      ${['today','week','year','manage'].map(v => `
        <button class="tab ${state.view === v ? 'active' : ''}" data-tab="${v}">${v}</button>
      `).join('')}
    </div>

    <div class="content">
      ${state.view === 'today' ? buildToday() : ''}
      ${state.view === 'week' ? buildWeek() : ''}
      ${state.view === 'year' ? buildYear() : ''}
      ${state.view === 'manage' ? buildManage() : ''}
    </div>
  `;
}

function buildToday() {
  const today = todayKey();
  if (state.habits.length === 0) return `<div class="empty-state">No habits yet. Go to Manage to add some.</div>`;
  return state.habits.map(habit => {
    const val = getValue(habit.id, today);
    const done = isDone(habit, today);
    const streak = getStreak(habit.id);
    return `
      <div class="habit-card ${done ? 'done' : ''}">
        <div>
          <div class="habit-label">${habit.label}</div>
          ${streak > 1 ? `<div class="habit-streak">🔥 ${streak} day streak</div>` : ''}
          ${habit.type === 'quantity' ? `<div class="habit-sub">Goal: ${habit.goal} · ${habit.weeklyTarget}×/week</div>` : `<div class="habit-sub">${habit.weeklyTarget}×/week target</div>`}
        </div>
        ${habit.type === 'boolean'
          ? `<button class="check-btn ${done ? 'done' : ''}" data-toggle="${habit.id}" data-date="${today}">${done ? '✓' : ''}</button>`
          : `<div class="qty-controls">
               <button class="qty-btn" data-setval="${habit.id}" data-date="${today}" data-val="${Math.max(0,(val||0)-1)}">−</button>
               <span class="qty-val" style="color:${done?'#4ade80':'#f0f0f0'}">${val||0}</span>
               <button class="qty-btn" data-setval="${habit.id}" data-date="${today}" data-val="${(val||0)+1}">+</button>
             </div>`
        }
      </div>
    `;
  }).join('');
}

function buildWeek() {
  const days = getLast7Days();
  const today = todayKey();
  return `
    <div style="overflow-x:auto;">
      <table class="week-table">
        <thead>
          <tr>
            <th class="habit-col"></th>
            ${days.map(d => {
              const isToday = d === today;
              const label = isToday ? 'Today' : new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short'});
              return `<th class="${isToday ? 'today-col' : ''}">${label}</th>`;
            }).join('')}
          </tr>
        </thead>
        <tbody>
          ${state.habits.map(habit => `
            <tr>
              <td class="habit-name">${habit.label}</td>
              ${days.map(d => {
                const done = isDone(habit, d);
                const val = getValue(habit.id, d);
                return `
                  <td style="text-align:center">
                    <div class="week-cell ${done ? 'done' : ''}"
                      data-toggle="${habit.id}" data-date="${d}">
                      ${done ? '✓' : (habit.type === 'quantity' && val ? val : '')}
                    </div>
                  </td>
                `;
              }).join('')}
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function buildYear() {
  const weeks = getYearWeeks();
  const today = todayKey();

  return state.habits.map(habit => {
    const cells = weeks.map(mondayStr => {
      const { done, target, pct } = getWeekScore(habit, mondayStr);
      const color = intensityColor(pct);
      const weekEnd = localDateStr(new Date(new Date(mondayStr+'T12:00:00').setDate(new Date(mondayStr+'T12:00:00').getDate()+6)));
      const isFuture = mondayStr > today;
      const label = `${mondayStr} – ${weekEnd}: ${done}/${target} days`;
      return `<div class="year-cell tooltip-wrap"
        style="background:${isFuture ? '#141414' : color}; cursor:${isFuture ? 'default' : 'default'}"
        title="${isFuture ? 'Future' : label}"></div>`;
    });

    // Month labels — show month name at roughly the right position
    const monthLabels = buildMonthLabels(weeks);

    // Streak of full weeks
    let weekStreak = 0;
    for (let i = weeks.length - 1; i >= 0; i--) {
      const { pct } = getWeekScore(habit, weeks[i]);
      if (pct >= 1) weekStreak++; else break;
    }

    const thisYear = weeks.reduce((sum, w) => {
      const { done } = getWeekScore(habit, w);
      return sum + done;
    }, 0);

    return `
      <div class="year-habit-block">
        <div class="year-habit-header">
          <div class="year-habit-name">${habit.label}</div>
          <div class="year-habit-meta">${thisYear} days this year${weekStreak > 1 ? ` · ${weekStreak}wk streak` : ''}</div>
        </div>
        <div style="display:flex; gap:3px; margin-bottom:4px; overflow-x:auto; padding-bottom:2px;">
          ${monthLabels}
        </div>
        <div style="display:flex; gap:3px; overflow-x:auto; padding-bottom:4px;">
          ${cells.join('')}
        </div>
        <div style="display:flex; align-items:center; gap:6px; margin-top:8px;">
          <span style="font-size:10px; color:#555">Less</span>
          ${['#1e1e1e','#0d2b0d','#1a4a1a','#2a6e2a','#3aaa3a','#4ade80'].map(c =>
            `<div style="width:10px;height:10px;border-radius:2px;background:${c};flex-shrink:0"></div>`
          ).join('')}
          <span style="font-size:10px; color:#555">More</span>
          <span style="font-size:10px; color:#555; margin-left:4px;">Target: ${habit.weeklyTarget}×/wk</span>
        </div>
      </div>
    `;
  }).join('') || `<div class="empty-state">No habits yet. Go to Manage to add some.</div>`;
}

function buildMonthLabels(weeks) {
  // For each week column, show month label if it's the first week of that month
  let lastMonth = -1;
  return weeks.map(mondayStr => {
    const m = new Date(mondayStr+'T12:00:00').getMonth();
    if (m !== lastMonth) {
      lastMonth = m;
      const name = new Date(mondayStr+'T12:00:00').toLocaleDateString('en-US',{month:'short'});
      return `<div style="width:10px;flex-shrink:0;font-size:9px;color:#555;white-space:nowrap;overflow:visible">${name}</div>`;
    }
    return `<div style="width:10px;flex-shrink:0"></div>`;
  }).join('');
}

function buildManage() {
  const cards = state.habits.map(habit => {
    if (state.editingId === habit.id) return buildEditForm(habit);
    return `
      <div class="manage-card">
        <div class="manage-card-row">
          <div>
            <div class="manage-label">${habit.label}</div>
            <div class="manage-sub">${habit.type === 'boolean' ? 'Yes / No' : `Quantity · goal ${habit.goal}`} · ${habit.weeklyTarget}×/week</div>
          </div>
          <div class="btn-row">
            <button class="btn-edit" data-edit="${habit.id}">Edit</button>
            <button class="btn-delete" data-delete="${habit.id}">Delete</button>
          </div>
        </div>
      </div>
    `;
  }).join('');

  const addForm = state.showAddForm ? buildAddForm() : `<button class="add-btn" id="show-add">+ Add Habit</button>`;

  return cards + addForm;
}

function buildDaysGrid(target, prefix) {
  const days = [1,2,3,4,5,6,7];
  return `
    <label class="form-label">Days per week target</label>
    <div class="days-grid">
      ${days.map(d => `
        <button class="day-btn ${target >= d ? 'active' : ''}" data-days="${d}" data-prefix="${prefix}">${d}</button>
      `).join('')}
    </div>
  `;
}

function buildEditForm(habit) {
  return `
    <div class="form-card" id="edit-form-${habit.id}">
      <div class="form-title">Edit habit</div>
      <input class="form-input" id="edit-label-${habit.id}" value="${habit.label}" placeholder="Habit name" />
      ${buildDaysGrid(habit.weeklyTarget || 7, `edit-${habit.id}`)}
      ${habit.type === 'quantity' ? `<input class="form-input" id="edit-goal-${habit.id}" type="number" value="${habit.goal||1}" placeholder="Daily goal" />` : ''}
      <div class="form-actions">
        <button class="btn-primary" data-save="${habit.id}">Save</button>
        <button class="btn-secondary" data-cancel-edit>Cancel</button>
      </div>
    </div>
  `;
}

function buildAddForm() {
  const nh = state.newHabit;
  return `
    <div class="form-card">
      <div class="form-title">New habit</div>
      <input class="form-input" id="new-label" value="${nh.label}" placeholder="Habit name" />
      <div class="type-toggle">
        <button class="type-btn ${nh.type==='boolean'?'active':''}" data-newtype="boolean">Yes / No</button>
        <button class="type-btn ${nh.type==='quantity'?'active':''}" data-newtype="quantity">Quantity</button>
      </div>
      ${nh.type === 'quantity' ? `<input class="form-input" id="new-goal" type="number" value="${nh.goal}" placeholder="Daily goal (e.g. 8)" />` : ''}
      ${buildDaysGrid(nh.weeklyTarget || 7, 'new')}
      <div class="form-actions">
        <button class="btn-primary" id="do-add">Add Habit</button>
        <button class="btn-secondary" id="cancel-add">Cancel</button>
      </div>
    </div>
  `;
}

// ─── EVENTS ──────────────────────────────────────────────────────────────────
function bindEvents() {
  // Tabs
  document.querySelectorAll('[data-tab]').forEach(el => {
    el.addEventListener('click', () => { state.view = el.dataset.tab; render(); });
  });

  // Toggle (today + week)
  document.querySelectorAll('[data-toggle]').forEach(el => {
    el.addEventListener('click', () => {
      const { toggle: habitId, date } = el.dataset;
      const habit = state.habits.find(h => h.id === habitId);
      if (!habit) return;
      if (habit.type === 'boolean') {
        toggle(habitId, date);
      } else {
        const val = getValue(habitId, date);
        const done = isDone(habit, date);
        setVal(habitId, done ? 0 : (habit.goal || 1), date);
      }
    });
  });

  // Qty +/−
  document.querySelectorAll('[data-setval]').forEach(el => {
    el.addEventListener('click', () => {
      setVal(el.dataset.setval, parseFloat(el.dataset.val), el.dataset.date);
    });
  });

  // Edit
  document.querySelectorAll('[data-edit]').forEach(el => {
    el.addEventListener('click', () => { state.editingId = el.dataset.edit; render(); });
  });

  // Save edit
  document.querySelectorAll('[data-save]').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.save;
      const labelEl = document.getElementById(`edit-label-${id}`);
      const goalEl = document.getElementById(`edit-goal-${id}`);
      const activeDay = document.querySelector(`[data-prefix="edit-${id}"].day-btn.active:last-of-type`);
      // get highest active day btn
      let weeklyTarget = 7;
      document.querySelectorAll(`[data-prefix="edit-${id}"].day-btn`).forEach(btn => {
        if (btn.classList.contains('active')) weeklyTarget = parseInt(btn.dataset.days);
      });
      state.habits = state.habits.map(h => h.id === id ? {
        ...h,
        label: labelEl ? labelEl.value.trim() || h.label : h.label,
        goal: goalEl ? parseInt(goalEl.value)||1 : h.goal,
        weeklyTarget,
      } : h);
      state.editingId = null;
      saveHabits(); render();
    });
  });

  // Cancel edit
  document.querySelectorAll('[data-cancel-edit]').forEach(el => {
    el.addEventListener('click', () => { state.editingId = null; render(); });
  });

  // Delete
  document.querySelectorAll('[data-delete]').forEach(el => {
    el.addEventListener('click', () => {
      if (confirm(`Delete "${state.habits.find(h=>h.id===el.dataset.delete)?.label}"?`)) {
        state.habits = state.habits.filter(h => h.id !== el.dataset.delete);
        saveHabits(); render();
      }
    });
  });

  // Show add form
  const showAdd = document.getElementById('show-add');
  if (showAdd) showAdd.addEventListener('click', () => { state.showAddForm = true; render(); });

  // Cancel add
  const cancelAdd = document.getElementById('cancel-add');
  if (cancelAdd) cancelAdd.addEventListener('click', () => { state.showAddForm = false; state.newHabit = { label:'', type:'boolean', goal:'', weeklyTarget:7 }; render(); });

  // New habit type toggle
  document.querySelectorAll('[data-newtype]').forEach(el => {
    el.addEventListener('click', () => {
      const labelEl = document.getElementById('new-label');
      const goalEl = document.getElementById('new-goal');
      state.newHabit.label = labelEl ? labelEl.value : state.newHabit.label;
      state.newHabit.goal = goalEl ? goalEl.value : state.newHabit.goal;
      state.newHabit.type = el.dataset.newtype;
      render();
    });
  });

  // Days grid buttons
  document.querySelectorAll('.day-btn').forEach(el => {
    el.addEventListener('click', () => {
      const val = parseInt(el.dataset.days);
      const prefix = el.dataset.prefix;
      if (prefix === 'new') {
        const labelEl = document.getElementById('new-label');
        const goalEl = document.getElementById('new-goal');
        if (labelEl) state.newHabit.label = labelEl.value;
        if (goalEl) state.newHabit.goal = goalEl.value;
        state.newHabit.weeklyTarget = val;
        render();
      }
      // edit prefix handled by save
    });
  });

  // Sync new habit label/goal on input
  const newLabelEl = document.getElementById('new-label');
  if (newLabelEl) newLabelEl.addEventListener('input', e => { state.newHabit.label = e.target.value; });
  const newGoalEl = document.getElementById('new-goal');
  if (newGoalEl) newGoalEl.addEventListener('input', e => { state.newHabit.goal = e.target.value; });

  // Do add
  const doAdd = document.getElementById('do-add');
  if (doAdd) doAdd.addEventListener('click', () => {
    const labelEl = document.getElementById('new-label');
    const goalEl = document.getElementById('new-goal');
    const label = (labelEl ? labelEl.value : state.newHabit.label).trim();
    if (!label) return;
    // get weeklyTarget from active day btn
    let weeklyTarget = state.newHabit.weeklyTarget || 7;
    document.querySelectorAll('[data-prefix="new"].day-btn').forEach(btn => {
      if (btn.classList.contains('active')) weeklyTarget = parseInt(btn.dataset.days);
    });
    const id = label.toLowerCase().replace(/\s+/g,'-') + '-' + Date.now();
    const h = { id, label, type: state.newHabit.type, weeklyTarget };
    if (state.newHabit.type === 'quantity') h.goal = parseInt(goalEl ? goalEl.value : state.newHabit.goal) || 1;
    state.habits.push(h);
    state.newHabit = { label:'', type:'boolean', goal:'', weeklyTarget:7 };
    state.showAddForm = false;
    saveHabits(); render();
  });
}

// ─── INIT ────────────────────────────────────────────────────────────────────
load();
render();
</script>
</body>
</html>
